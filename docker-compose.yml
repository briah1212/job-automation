services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: job_automation_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-job_automation}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${INFRA_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job_automation_network

  # Redis for caching and locks
  redis:
    image: redis:7-alpine
    container_name: job_automation_redis
    ports:
      - "${INFRA_BIND:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - job_automation_network

  # MinIO for file storage
  minio:
    image: minio/minio:latest
    container_name: job_automation_minio
    command: server /data --console-address ":9011"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${INFRA_BIND:-127.0.0.1}:${MINIO_PORT:-9000}:9000"
      - "${INFRA_BIND:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9011}:9011"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - job_automation_network

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job_automation_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-job_automation}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BROWSER_BUCKET: ${MINIO_BROWSER_BUCKET:-browser-artifacts}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env - see .env.example}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY must be set in .env - see .env.example}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env - see .env.example}
      CORS_ORIGINS: '["${NEXTAUTH_URL:-http://localhost:3002}","http://localhost:3000"]'
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    ports:
      - "${API_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - job_automation_network
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Job Extraction Worker (DB-backed polling worker, always-on)
  job-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job_automation_worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-job_automation}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env - see .env.example}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY must be set in .env - see .env.example}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env - see .env.example}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./backend:/app
    command: python worker.py
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - job_automation_network

  # Frontend Web App
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    container_name: job_automation_web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
      API_URL: http://api:8000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set in .env - see .env.example}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3002}
    ports:
      - "${WEB_PORT:-3002}:3000"
    depends_on:
      - api
    networks:
      - job_automation_network

  # Browser Worker
  browser-worker:
    build:
      context: ./apps/browser-worker
      dockerfile: Dockerfile
    container_name: job_automation_browser_worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-job_automation}
      API_URL: http://api:8000
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      PYTHONPATH: /backend
      HEADLESS: ${HEADLESS:-true}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env - see .env.example}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BROWSER_BUCKET: ${MINIO_BROWSER_BUCKET:-browser-artifacts}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env - see .env.example}
    volumes:
      - ./apps/browser-worker:/app
      - ./backend:/backend:ro
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - job_automation_network

  # Mock ATS Site (for testing - not required in a real deployment, but has
  # no external dependencies of its own so it's harmless to leave running)
  mock-ats:
    image: python:3.11-slim
    container_name: job_automation_mock_ats
    working_dir: /app
    volumes:
      - ./fixtures/ats-sites/mock-ats:/app
    ports:
      - "${MOCK_ATS_PORT:-8080}:8080"
    command: python server.py
    networks:
      - job_automation_network

volumes:
  postgres_data:
  minio_data:

networks:
  job_automation_network:
    driver: bridge
