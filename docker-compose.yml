version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: job_automation_db
    environment:
      POSTGRES_DB: job_automation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job_automation_network

  # Redis for caching and locks
  redis:
    image: redis:7-alpine
    container_name: job_automation_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - job_automation_network

  # MinIO for file storage
  minio:
    image: minio/minio:latest
    container_name: job_automation_minio
    command: server /data --console-address ":9011"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9011:9011"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - job_automation_network

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job_automation_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_automation
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: resumes
      MINIO_BROWSER_BUCKET: browser-artifacts
      JWT_SECRET: dev-secret-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 1440
      CREDENTIAL_ENCRYPTION_KEY: LXtkpaYI5TGKJJLaaTaxwB5C9V9242HBH1RwanGewt4=
      INTERNAL_API_KEY: dev-internal-key-change-in-production
      AI_PROVIDER: mock
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - job_automation_network
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Job Extraction Worker (DB-backed polling worker, always-on)
  job-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job_automation_worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_automation
      AI_PROVIDER: mock
    volumes:
      - ./backend:/app
    command: python worker.py
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - job_automation_network

  # Frontend Web App
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: job_automation_web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
      API_URL: http://api:8000
      NEXTAUTH_SECRET: dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3002
    ports:
      - "3002:3000"
    depends_on:
      - api
    networks:
      - job_automation_network

  # Browser Worker
  browser-worker:
    build:
      context: ./apps/browser-worker
      dockerfile: Dockerfile
    container_name: job_automation_browser_worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_automation
      API_URL: http://api:8000
      AI_PROVIDER: mock
      PYTHONPATH: /backend
      HEADLESS: "true"
      SECRET_KEY: dev-secret-change-in-production
      JWT_SECRET: dev-secret-change-in-production
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BROWSER_BUCKET: browser-artifacts
      INTERNAL_API_KEY: dev-internal-key-change-in-production
    volumes:
      - ./apps/browser-worker:/app
      - ./backend:/backend:ro
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - job_automation_network

  # Mock ATS Site (for testing)
  mock-ats:
    image: python:3.11-slim
    container_name: job_automation_mock_ats
    working_dir: /app
    volumes:
      - ./fixtures/ats-sites/mock-ats:/app
    ports:
      - "8080:8080"
    command: python server.py
    networks:
      - job_automation_network

volumes:
  postgres_data:
  minio_data:

networks:
  job_automation_network:
    driver: bridge
